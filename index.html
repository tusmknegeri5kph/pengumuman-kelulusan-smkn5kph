<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan</title>

<style>
body {
  font-family: Arial;
  background:#e0f7fa;
  text-align:center;
}

/* BOX */
.container {
  background:white;
  padding:20px;
  margin:30px auto;
  width:90%;
  max-width:420px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* COUNTDOWN */
#digitalCountdown {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.timeBox {
  background:#0d47a1;
  color:white;
  padding:12px;
  border-radius:10px;
  width:70px;
  animation:pulse 1s infinite;
}

.timeBox span {
  font-size:24px;
  font-weight:bold;
}

@keyframes pulse {
  0% {transform:scale(1);}
  50% {transform:scale(1.1);}
  100% {transform:scale(1);}
}

#formInput { display:none; }

button {
  padding:10px;
  width:100%;
  margin-top:10px;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
</style>
</head>

<body>

<canvas id="fireworksCanvas"></canvas>

<div class="container">

<h2>Pengumuman Kelulusan</h2>

<div id="countdownBox">
  <h3>Dibuka dalam:</h3>

  <div id="digitalCountdown">
    <div class="timeBox"><span id="days">00</span><br>Hari</div>
    <div class="timeBox"><span id="hours">00</span><br>Jam</div>
    <div class="timeBox"><span id="minutes">00</span><br>Menit</div>
    <div class="timeBox"><span id="seconds">00</span><br>Detik</div>
  </div>
</div>

<div id="formInput">
  <input type="text" id="token" placeholder="Masukkan NISN">
  <button onclick="checkGraduation()">Cek</button>
</div>

<div id="result"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const targetDate = new Date("2026-05-04T15:00:00+07:00").getTime();

const elDays = document.getElementById("days");
const elHours = document.getElementById("hours");
const elMinutes = document.getElementById("minutes");
const elSeconds = document.getElementById("seconds");

const formInput = document.getElementById("formInput");
const countdownBox = document.getElementById("countdownBox");

let beepPlayed = false;

function beep(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  osc.type="sine";
  osc.frequency.setValueAtTime(800, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.1);
}

function updateCountdown(){
  const now = new Date().getTime();
  const distance = targetDate - now;

  if(distance <= 0){
    countdownBox.style.display="none";
    formInput.style.display="block";
    startFireworks();
    return;
  }

  const d = Math.floor(distance/(1000*60*60*24));
  const h = Math.floor((distance/(1000*60*60))%24);
  const m = Math.floor((distance/(1000*60))%60);
  const s = Math.floor((distance/1000)%60);

  elDays.textContent = d;
  elHours.textContent = h;
  elMinutes.textContent = m;
  elSeconds.textContent = s;

  // 🔊 bunyi 10 detik terakhir
  if(distance < 10000){
    beep();
  }
}

setInterval(updateCountdown,1000);
updateCountdown();

/* FIREWORKS */
function startFireworks(){
  const canvas = document.getElementById('fireworksCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles=[];

  function create(x,y){
    for(let i=0;i<60;i++){
      particles.push({
        x,y,
        angle:Math.random()*Math.PI*2,
        speed:Math.random()*5,
        life:100
      });
    }
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=Math.cos(p.angle)*p.speed;
      p.y+=Math.sin(p.angle)*p.speed;
      p.life--;

      ctx.fillRect(p.x,p.y,3,3);
    });
    particles=particles.filter(p=>p.life>0);
    requestAnimationFrame(draw);
  }

  for(let i=0;i<5;i++){
    setTimeout(()=>{
      create(Math.random()*canvas.width, Math.random()*canvas.height/2);
    },i*500);
  }

  draw();
}

});
</script>

</body>
</html>
